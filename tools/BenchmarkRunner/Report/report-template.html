<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integration Test Benchmark</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 1100px; margin: 0 auto; padding: 24px;
      background: #f9fafb; color: #111;
    }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .meta { color: #6b7280; font-size: 0.82rem; margin-bottom: 32px; }
    .card {
      background: #fff; border-radius: 8px; padding: 24px;
      margin-bottom: 32px; box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    h2 { font-size: 1.05rem; margin: 0 0 4px; }
    .subtitle { color: #6b7280; font-size: 0.8rem; margin: 0 0 20px; }
    canvas { max-height: 350px; }
  </style>
</head>
<body>
  <script>const BENCHMARK_DATA = /*INJECT_JSON*/;</script>

  <h1>Integration Test Benchmark</h1>
  <p class="meta" id="meta"></p>

  <div class="card">
    <h2>Сценарий 1 — Влияние числа миграций</h2>
    <p class="subtitle" id="subtitle-migrations"></p>
    <canvas id="chart-migrations"></canvas>
  </div>

  <div class="card">
    <h2>Сценарий 2 — Масштаб числа тестов</h2>
    <p class="subtitle" id="subtitle-scale"></p>
    <canvas id="chart-scale"></canvas>
  </div>

  <div class="card">
    <h2>Сценарий 3 — Параллелизм</h2>
    <p class="subtitle" id="subtitle-parallelism"></p>
    <canvas id="chart-parallelism"></canvas>
  </div>

  <div class="card">
    <h2>Состав времени — минимум и максимум миграций</h2>
    <p class="subtitle" id="subtitle-timing"></p>
    <canvas id="chart-timing"></canvas>
  </div>

  <script>
    const data = BENCHMARK_DATA;
    const BASE_TEST_COUNT = data.baseTestCount;

    document.getElementById('meta').textContent =
      'Сгенерировано: ' + new Date(data.generatedAt).toLocaleString('ru') +
      '  |  Машина: ' + data.machineName;

    (function buildSubtitles() {
      const m1 = data.results.find(r => r.scenario.scenarioName === 'migrations');
      if (m1) document.getElementById('subtitle-migrations').textContent =
        `${m1.scenario.classScale * BASE_TEST_COUNT} тестов, потоков=${m1.scenario.maxParallelThreads}` +
        ` | Ось X: количество миграций в проекте`;

      const m2 = data.results.find(r => r.scenario.scenarioName === 'scale');
      if (m2) document.getElementById('subtitle-scale').textContent =
        `${m2.scenario.migrationCount} миграций, потоков=${m2.scenario.maxParallelThreads}` +
        ` | Ось X: количество тестов`;

      const m3 = data.results.find(r => r.scenario.scenarioName === 'parallelism');
      if (m3) document.getElementById('subtitle-parallelism').textContent =
        `${m3.scenario.migrationCount} миграций, ${m3.scenario.classScale * BASE_TEST_COUNT} тестов` +
        ` | Ось X: MaxParallelThreads`;

      if (m1) document.getElementById('subtitle-timing').textContent =
        `${m1.scenario.classScale * BASE_TEST_COUNT} тестов, потоков=${m1.scenario.maxParallelThreads}` +
        ` | Слои: миграции / сброс данных / бизнес-логика`;
    })();

    const COLORS = {
      IntegreSQL:     { border: 'rgb(59,130,246)',  bg: 'rgba(59,130,246,0.12)'  },
      Respawn:        { border: 'rgb(34,197,94)',   bg: 'rgba(34,197,94,0.12)'   },
      Testcontainers: { border: 'rgb(239,68,68)',   bg: 'rgba(239,68,68,0.12)'   },
    };

    const APPROACHES = ['IntegreSQL', 'Respawn', 'Testcontainers'];

    function buildChart(canvasId, scenarioName, xField, xLabel, xTransform = x => x) {
      const rows    = data.results.filter(r => r.scenario.scenarioName === scenarioName);
      const xValues = [...new Set(rows.map(r => r.scenario[xField]))].sort((a, b) => a - b);

      const datasets = APPROACHES.map(approach => ({
        label:           approach,
        data:            xValues.map(x => {
          const row = rows.find(r => r.scenario.approach === approach && r.scenario[xField] === x);
          return row ? +row.elapsedSeconds.toFixed(2) : null;
        }),
        borderColor:     COLORS[approach].border,
        backgroundColor: COLORS[approach].bg,
        borderWidth:     2,
        pointRadius:     5,
        tension:         0.15,
        fill:            false,
      }));

      new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: { labels: xValues.map(xTransform), datasets },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'top' },
            tooltip: {
              callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + ' с' }
            }
          },
          scales: {
            x: { title: { display: true, text: xLabel } },
            y: { title: { display: true, text: 'Время (секунды)' }, beginAtZero: true }
          }
        }
      });
    }

    buildChart('chart-migrations', 'migrations', 'migrationCount',     'Количество миграций');
    buildChart('chart-scale',      'scale',      'classScale',          'Количество тестов', x => x * BASE_TEST_COUNT);
    buildChart('chart-parallelism','parallelism', 'maxParallelThreads', 'MaxParallelThreads');

    (function buildTimingChart() {
      const MIN_M = 17, MAX_M = 117;
      const rows = data.results.filter(r =>
        r.scenario.scenarioName === 'migrations' &&
        (r.scenario.migrationCount === MIN_M || r.scenario.migrationCount === MAX_M)
      );
      if (!rows.length) return;

      const labels = [];
      const migData = [], resetData = [], bizData = [];
      const bizColors = [];

      for (const approach of APPROACHES) {
        for (const count of [MIN_M, MAX_M]) {
          const row = rows.find(r => r.scenario.approach === approach && r.scenario.migrationCount === count);
          labels.push(approach + ' (' + count + ')');
          const mig   = row ? +(row.migrationSeconds || 0).toFixed(2) : null;
          const reset = row ? +(row.resetSeconds     || 0).toFixed(2) : null;
          const biz   = row ? +Math.max(0, row.elapsedSeconds - (row.migrationSeconds || 0) - (row.resetSeconds || 0)).toFixed(2) : null;
          migData.push(mig);
          resetData.push(reset);
          bizData.push(biz);
          bizColors.push(COLORS[approach].border.replace('rgb', 'rgba').replace(')', ',0.7)'));
        }
      }

      new Chart(document.getElementById('chart-timing'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'Миграции',      data: migData,   backgroundColor: 'rgba(251,146,60,0.85)', stack: 'a' },
            { label: 'Сброс данных',  data: resetData, backgroundColor: 'rgba(250,204,21,0.85)', stack: 'a' },
            { label: 'Бизнес-логика', data: bizData,   backgroundColor: bizColors,               stack: 'a' },
          ]
        },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'top' },
            tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + ' с' } }
          },
          scales: {
            x: { stacked: true },
            y: { stacked: true, title: { display: true, text: 'Время (секунды)' }, beginAtZero: true }
          }
        }
      });
    })();
  </script>
</body>
</html>
